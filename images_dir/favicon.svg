<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="10" fill="#111216"/>
  <!-- Subtle inner border -->
  <rect x="0.5" y="0.5" width="63" height="63" rx="9.5" fill="none" stroke="#3AA7C9" stroke-opacity="0.35" stroke-width="1"/>
  <!-- Outer ring (thicker and fully visible) -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#3AA7C9" stroke-width="2.4" stroke-opacity="1"/>
  <!-- Central dot — the brand mark -->
  <circle cx="32" cy="32" r="10" fill="#3AA7C9"/>
  <!-- Left & right accent dots (afterimage trail) — much larger and brighter -->
  <circle cx="54" cy="32" r="3.6" fill="#F7F7F8"/>
  <circle cx="10" cy="32" r="3.6" fill="#F7F7F8" opacity="0.75"/>
</svg>
